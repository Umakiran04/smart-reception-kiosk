<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Staff</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-body">

<div class="dashboard-container">
    <h2>All Staff</h2>

    <table class="fixed-table">
        <thead>
            <tr>
                <th>Staff ID</th>
                <th>Name</th>
                <th>Role</th>
            </tr>
        </thead>
        <tbody>
        {% for s in staff %}
            <tr>
                <td>{{ s[0] }}</td>
                <td>{{ s[1] }}</td>
                <td>{{ s[3] }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

    <br>
    <a href="/admin_dashboard" class="btn-blue">⬅ Back</a>
</div>

</body>
</html>
