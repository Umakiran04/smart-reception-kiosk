<!DOCTYPE html>
<html>
<head>
    <title>NRSC Visitor Records</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        th {
            background: #003366;
            color: white;
        }
    </style>
</head>
<body>

<h2>NRSC Visitor Records</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Phone</th>
        <th>Whom to Meet</th>
        <th>Purpose</th>
        <th>Date</th>
        <th>Time</th>
    </tr>

    {% for v in visitors %}
    <tr>
        <td>{{ v[0] }}</td>
        <td>{{ v[1] }}</td>
        <td>{{ v[2] }}</td>
        <td>{{ v[3] }}</td>
        <td>{{ v[4] }}</td>
        <td>{{ v[5] }}</td>
        <td>{{ v[6] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
