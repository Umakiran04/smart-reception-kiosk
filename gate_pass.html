<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | NRSC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="light-body">

<div class="dashboard-wrapper">
    <div class="dashboard-card">

        <!-- ADMIN INFO HEADER -->
        <div class="dashboard-header">
            <h2>Welcome, {{ admin_name }}</h2>
            <p class="subtitle">
                Admin ID: {{ admin_id }} <br>
                Logged in at: {{ login_time }}
            </p>
        </div>

        <!-- DASHBOARD ACTIONS -->
        <div class="dashboard-actions">

    <a href="/admin/visitors" class="btn-orange full-width">
        View All Visitors
    </a>

    <a href="/admin/staff" class="btn-orange full-width">
        View All Staff
    </a>
    <a href="/admin/staff-visitor-count" class="btn-orange full-width">
        Staff-wise Visitor Count
    </a>
    <a href="/logout" class="btn-orange full-width">
        Logout
    </a>

</div>


    </div>
</div>

</body>
</html>
